services:
  - type: web
    name: eklavya
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false # User will set this in Render Dashboard
      - key: LLM_PROVIDER
        value: gemini


